x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres/${DB_NAME:-airflow}
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-pandas==2.2.3 openpyxl==3.1.5 requests==2.32.3 sqlalchemy==1.4.52 psycopg2-binary==2.9.9}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-airflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-airflow}
      POSTGRES_DB: ${DB_NAME:-airflow}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    env_file: .env
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER:-airflow} --password ${AIRFLOW_ADMIN_PASSWORD:-airflow} --firstname Air --lastname Flow --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"

  airflow-webserver:
    <<: *airflow-common
    env_file: .env
    command: webserver
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_PUBLIC_BASE_URL}
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1

  airflow-scheduler:
    <<: *airflow-common
    env_file: .env
    command: scheduler
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1

  caddy:
    image: caddy:2.8
    depends_on:
      - airflow-webserver
      - metabase
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      METABASE_PUBLIC_DOMAIN: ${METABASE_PUBLIC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: always

  metabase:
    image: metabase/metabase:v0.56.5
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_URL: ${METABASE_PUBLIC_BASE_URL}
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_SECRET_KEY}
    volumes:
      - metabase-data:/metabase-data
    restart: always

volumes:
  postgres-db-volume:
  caddy-data:
  caddy-config:
  metabase-data:
